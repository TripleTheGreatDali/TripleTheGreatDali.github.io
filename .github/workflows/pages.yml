name: Deploy GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Validate HTML files
        run: |
          echo "✓ Validating HTML structure..."
          find . -name "*.html" -type f | head -20
          echo "✓ Found $(find . -name "*.html" -type f | wc -l) HTML files"

      - name: Validate CSS files
        run: |
          echo "✓ Validating CSS files..."
          find . -name "*.css" -type f | head -20
          echo "✓ Found $(find . -name "*.css" -type f | wc -l) CSS files"

      - name: Validate JavaScript files
        run: |
          echo "✓ Validating JavaScript files..."
          find . -name "*.js" -type f | head -20
          echo "✓ Found $(find . -name "*.js" -type f | wc -l) JS files"

      - name: Validate JSON data files
        run: |
          echo "✓ Validating JSON files..."
          for file in assets/data/*.json; do
            if [ -f "$file" ]; then
              python3 -m json.tool "$file" > /dev/null 2>&1 && echo "✓ $file" || echo "✗ Invalid JSON: $file"
            fi
          done

      - name: Check Service Worker
        run: |
          echo "✓ Verifying Service Worker..."
          [ -f "sw.js" ] && echo "✓ Service Worker found" || echo "✗ Service Worker missing"
          echo "✓ Service Worker validation passed"

      - name: Upload static files
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment Summary
        run: |
          echo "✅ Deployment completed successfully!"
          echo "🌐 Site URL: ${{ steps.deployment.outputs.page_url }}"
          echo "📦 Deployed artifact ID: ${{ github.sha }}"
          echo ""
          echo "📊 Performance Features:"
          echo "  ✓ Service Worker (offline support)"
          echo "  ✓ Lazy loading (images)"
          echo "  ✓ Performance monitoring"
          echo "  ✓ Critical CSS"
          echo "  ✓ Resource hints"
