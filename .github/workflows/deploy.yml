name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

# Allow GitHub Actions to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Pages
      uses: actions/configure-pages@v5
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install backend dependencies
      run: npm ci
      working-directory: ./backend
      continue-on-error: true
    
    - name: Validate JSON data files
      run: |
        node -e "
        const fs = require('fs');
        const path = require('path');
        const dataDir = './assets/data';
        
        console.log('Validating JSON data files...');
        fs.readdirSync(dataDir).forEach(file => {
          if (file.endsWith('.json')) {
            try {
              const content = fs.readFileSync(path.join(dataDir, file), 'utf-8');
              JSON.parse(content);
              console.log('✓ Valid:', file);
            } catch (e) {
              throw new Error(\`Invalid JSON in \${file}: \${e.message}\`);
            }
          }
        });
        console.log('All JSON files valid!');
        "
    
    - name: Build artifact
      run: |
        mkdir -p _site
        cp -r assets css js components pages index.html _site/
        cp CNAME _site/ 2>/dev/null || true
        cp config.json _site/ 2>/dev/null || true
        ls -la _site/
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: github-pages
        path: _site/
        if-no-files-found: error
        retention-days: 1

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: github-pages
        path: ./
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

  # Post-deployment validation
  validate-deployment:
    name: Validate deployment
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Check deployment
      run: |
        echo "Deployment Status: ${{ needs.deploy.result }}"
        
        if [ "${{ needs.deploy.result }}" = "success" ]; then
          echo "✓ Deployment successful!"
          exit 0
        else
          echo "✗ Deployment failed"
          exit 1
        fi
