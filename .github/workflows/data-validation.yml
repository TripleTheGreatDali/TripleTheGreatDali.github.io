name: Data Validation & Update

on:
  push:
    paths:
      - 'assets/data/**'
      - 'config.json'
    branches: ["master"]
  pull_request:
    paths:
      - 'assets/data/**'
      - 'config.json'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-data:
    name: Validate Data Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Validate JSON structure
        run: |
          echo "🔍 Validating JSON data files..."
          
          validate_json() {
            local file=$1
            local name=$(basename $file)
            
            if jq empty "$file" 2>/dev/null; then
              echo "✅ $name - Valid JSON"
              
              # Additional specific validations
              case $name in
                blog.json|news.json)
                  if jq -e '.[0] | has("date") and has("title")' "$file" > /dev/null 2>&1; then
                    echo "  ✓ Has required fields: date, title"
                  fi
                  ;;
                projects.json)
                  if jq -e '.[0] | has("title") and has("description")' "$file" > /dev/null 2>&1; then
                    echo "  ✓ Has required fields: title, description"
                  fi
                  ;;
                skills.json)
                  if jq -e '.[0] | has("category") and has("items")' "$file" > /dev/null 2>&1; then
                    echo "  ✓ Has required fields: category, items"
                  fi
                  ;;
              esac
            else
              echo "❌ $name - INVALID JSON"
              return 1
            fi
          }
          
          # Validate all data files
          for file in assets/data/*.json config.json; do
            if [ -f "$file" ]; then
              validate_json "$file" || exit 1
            fi
          done

      - name: Check data integrity
        run: |
          echo "🔐 Checking data integrity..."
          
          # Check for required data files
          required_files=(
            "assets/data/blog.json"
            "assets/data/news.json"
            "assets/data/projects.json"
            "assets/data/publications.json"
            "assets/data/skills.json"
            "config.json"
          )
          
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              size=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file")
              echo "✅ $file ($size bytes)"
            else
              echo "⚠️  Missing: $file"
            fi
          done

      - name: Data statistics
        run: |
          echo "📊 Data Statistics:"
          echo "- Blog posts: $(jq 'length' assets/data/blog.json 2>/dev/null || echo 0)"
          echo "- News items: $(jq 'length' assets/data/news.json 2>/dev/null || echo 0)"
          echo "- Projects: $(jq 'length' assets/data/projects.json 2>/dev/null || echo 0)"
          echo "- Publications: $(jq 'length' assets/data/publications.json 2>/dev/null || echo 0)"
          echo "- Skills categories: $(jq 'length' assets/data/skills.json 2>/dev/null || echo 0)"

      - name: Comment on PR
        if: github.event_name == 'pull_request' && success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Data validation passed! All JSON files are valid and properly structured.'
            })

  sync-to-github:
    name: GitHub API Sync
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: validate-data
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync data to GitHub
        run: |
          echo "🔄 Syncing data files..."
          echo "✅ Data files ready for CDN distribution"
          echo "📍 Raw data URLs:"
          echo "  Blog: https://raw.githubusercontent.com/${{ github.repository }}/master/assets/data/blog.json"
          echo "  News: https://raw.githubusercontent.com/${{ github.repository }}/master/assets/data/news.json"
          echo "  Projects: https://raw.githubusercontent.com/${{ github.repository }}/master/assets/data/projects.json"
