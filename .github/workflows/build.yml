name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    # Checkout repository with Node.js 24 compatible action
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    # Setup Node.js environment
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    # Install dependencies
    - name: Install dependencies
      run: npm ci
      working-directory: ./backend
    
    # Run linting
    - name: Lint code
      run: npm run lint --if-present
      working-directory: ./backend
      continue-on-error: true
    
    # Validate JSON data files
    - name: Validate JSON data files
      run: |
        node -e "
        const fs = require('fs');
        const path = require('path');
        const dataDir = './assets/data';
        
        fs.readdirSync(dataDir).forEach(file => {
          if (file.endsWith('.json')) {
            try {
              const content = fs.readFileSync(path.join(dataDir, file), 'utf-8');
              JSON.parse(content);
              console.log('✓ Valid JSON:', file);
            } catch (e) {
              throw new Error(\`Invalid JSON in \${file}: \${e.message}\`);
            }
          }
        });
        "
    
    # Verify HTML files
    - name: Verify HTML files
      run: |
        for file in index.html pages/*.html; do
          if [ ! -f "$file" ]; then
            echo "✗ Missing file: $file"
            exit 1
          fi
          echo "✓ Found: $file"
        done
    
    # Upload build artifacts with Node.js 24 compatible action
    - name: Upload build artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-node-${{ matrix.node-version }}
        path: |
          index.html
          pages/
          css/
          js/
          assets/
        retention-days: 7

  # Validate the site structure
  validate:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Validate site structure
      run: |
        echo "Checking required files..."
        required_files=(
          "index.html"
          "pages/blog.html"
          "pages/projects.html"
          "pages/publications.html"
          "assets/data/blog.json"
          "assets/data/projects.json"
          "assets/data/publications.json"
          "js/main.js"
          "js/api-service.js"
        )
        
        for file in "${required_files[@]}"; do
          if [ -f "$file" ]; then
            echo "✓ $file"
          else
            echo "✗ MISSING: $file"
            exit 1
          fi
        done
        
        echo ""
        echo "All required files present!"
