name: Auto-Deploy to GitHub Pages

on:
  push:
    branches: ["master"]
  schedule:
    # Run daily at midnight UTC to ensure fresh cache
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Validate all assets
        run: |
          echo "🔍 Validating portfolio structure..."
          
          # Validate HTML files
          echo "✓ HTML files: $(find . -name "*.html" -type f | wc -l)"
          
          # Validate CSS files
          echo "✓ CSS files: $(find . -name "*.css" -type f | wc -l)"
          
          # Validate JavaScript files
          echo "✓ JavaScript files: $(find . -name "*.js" -type f | wc -l)"
          
          # Validate JSON data files
          echo "✓ JSON data files:"
          for file in assets/data/*.json; do
            if [ -f "$file" ]; then
              if jq empty "$file" 2>/dev/null; then
                echo "  ✅ $(basename $file)"
              else
                echo "  ❌ $(basename $file) - INVALID JSON"
                exit 1
              fi
            fi
          done

      - name: Validate config files
        run: |
          echo "✓ Validating config.json..."
          if jq empty config.json 2>/dev/null; then
            echo "  ✅ config.json is valid"
          else
            echo "  ❌ config.json is invalid"
            exit 1
          fi

      - name: Check critical files
        run: |
          echo "✓ Checking critical files..."
          files=("index.html" "config.json" "sw.js" "css/critical.css")
          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              echo "  ✅ $file ($(stat -c%s "$file" 2>/dev/null || stat -f%z "$file") bytes)"
            else
              echo "  ❌ Missing: $file"
              exit 1
            fi
          done

      - name: Generate site manifest
        run: |
          echo "✓ Generating site manifest..."
          cat > _manifest.json << 'EOF'
          {
            "generated": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "pages": $(find pages -name "*.html" -type f | jq -R -s 'split("\n")[:-1]'),
            "assets": {
              "styles": $(find css -name "*.css" -type f | jq -s 'length'),
              "scripts": $(find js -name "*.js" -type f | jq -s 'length'),
              "data": $(find assets/data -name "*.json" -type f | jq -s 'length')
            },
            "site": {
              "title": "$(jq -r '.siteConfig.title' config.json)",
              "url": "$(jq -r '.siteConfig.baseUrl' config.json)",
              "lastUpdated": "2026-03-29"
            }
          }
          EOF
          cat _manifest.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify deployment
        run: |
          echo "✅ Portfolio deployed to GitHub Pages!"
          echo "🌐 URL: https://TripleTheGreatDali.github.io"
          echo "📊 Last deploy: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

      - name: Purge CloudFlare cache (if using)
        if: false  # Enable if you have a CloudFlare domain
        run: |
          echo "🔄 Purging CDN cache..."
          # Add CloudFlare purge command here if needed
