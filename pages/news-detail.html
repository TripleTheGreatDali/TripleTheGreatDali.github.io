<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Detailed News - MD Foysal Ahmed">
    <title>News Details | MD Foysal Ahmed</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <style>
        .news-detail-container {
            max-width: 800px;
            margin: 100px auto;
            padding: 20px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            color: #1F4E79;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .news-detail-header {
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 2px solid #1F4E79;
        }

        .news-detail-date {
            font-size: 0.95em;
            color: #1F4E79;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .news-detail-category {
            display: inline-block;
            background: #1F4E79;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            margin-bottom: 15px;
        }

        .news-detail-title {
            font-size: 2.5em;
            color: #1F4E79;
            margin-bottom: 20px;
            line-height: 1.3;
        }

        .news-detail-content {
            font-size: 1.1em;
            line-height: 1.8;
            color: #333;
        }

        .news-detail-content p {
            margin-bottom: 20px;
            text-align: justify;
        }

        .news-detail-content h3 {
            color: #1F4E79;
            margin-top: 30px;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .news-detail-content ul {
            margin-left: 30px;
            margin-bottom: 20px;
        }

        .news-detail-content li {
            margin-bottom: 10px;
        }

        .related-news {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 2px solid #1F4E79;
        }

        .related-news h3 {
            color: #1F4E79;
            margin-bottom: 20px;
        }

        .related-news-list {
            display: grid;
            gap: 15px;
        }

        .related-news-item {
            padding: 15px;
            background: #f9f9f9;
            border-left: 3px solid #1F4E79;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .related-news-item:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }

        .related-news-item a {
            text-decoration: none;
            color: inherit;
        }

        .news-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }

        .news-nav a {
            color: #1F4E79;
            font-weight: 600;
            text-decoration: none;
        }

        .news-nav a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <span class="logo-accent">&gt;</span> Md Foysal Ahmed
            </div>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="education.html">Education</a></li>
                <li><a href="publications.html">Publications</a></li>
                <li><a href="research.html">Research</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="news.html">News</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <button class="mobile-menu-toggle">☰</button>
        </div>
    </nav>

    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="particle" style="--x: 10%; --y: 20%;"></div>
        <div class="particle" style="--x: 80%; --y: 60%;"></div>
        <div class="particle" style="--x: 40%; --y: 80%;"></div>
        <div class="particle" style="--x: 70%; --y: 30%;"></div>
        <div class="particle" style="--x: 20%; --y: 70%;"></div>
    </div>

    <!-- Main Content -->
    <article class="news-detail-container">
        <a href="news.html" class="back-link">← Back to News</a>
        
        <header class="news-detail-header">
            <div class="news-detail-date" id="newsDate"></div>
            <div class="news-detail-category" id="newsCategory"></div>
            <h1 class="news-detail-title" id="newsTitle"></h1>
        </header>

        <div class="news-detail-content" id="newsContent">
            <!-- Content will be loaded here -->
        </div>

        <div class="news-nav">
            <a href="#" id="prevNews" style="display: none;">← Previous News</a>
            <a href="news.html">All News</a>
            <a href="#" id="nextNews" style="display: none;">Next News →</a>
        </div>
    </article>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 MD Foysal Ahmed. All rights reserved.</p>
            <div class="social-links">
                <a href="https://github.com" target="_blank">GitHub</a>
                <a href="https://linkedin.com" target="_blank">LinkedIn</a>
                <a href="https://twitter.com" target="_blank">Twitter</a>
            </div>
        </div>
    </footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const newsId = urlParams.get('id');

        async function loadNewsDetail() {
            try {
                const response = await fetch('../assets/data/news.json');
                const newsItems = await response.json();
                const newsItem = newsItems[newsId];

                if (!newsItem) {
                    document.getElementById('newsContent').innerHTML = 
                        '<p style="color: red;">News item not found.</p>';
                    return;
                }

                // Set page title
                document.title = newsItem.title + ' | News';

                // Load news metadata
                document.getElementById('newsDate').textContent = newsItem.date;
                document.getElementById('newsCategory').textContent = newsItem.icon + ' ' + (newsItem.category || 'News');
                document.getElementById('newsTitle').textContent = newsItem.title;

                // Load full content (using description for now)
                const contentArea = document.getElementById('newsContent');
                contentArea.innerHTML = `
                    <p>${newsItem.description}</p>
                    <h3>Details</h3>
                    <p>${newsItem.description}</p>
                    <h3>Impact & Significance</h3>
                    <p>This news item represents an important development in the field of research and technology advancement.</p>
                `;

                // Setup navigation
                setupNewsNavigation(newsId, newsItems.length);

            } catch (error) {
                console.error('Error loading news detail:', error);
                document.getElementById('newsContent').innerHTML = 
                    '<p style="color: red;">Error loading news. Please try again later.</p>';
            }
        }

        function setupNewsNavigation(currentId, totalNews) {
            const prevButton = document.getElementById('prevNews');
            const nextButton = document.getElementById('nextNews');
            const currentIdNum = parseInt(currentId);

            if (currentIdNum > 0) {
                prevButton.href = `news-detail.html?id=${currentIdNum - 1}`;
                prevButton.style.display = 'block';
            }

            if (currentIdNum < totalNews - 1) {
                nextButton.href = `news-detail.html?id=${currentIdNum + 1}`;
                nextButton.style.display = 'block';
            }
        }

        document.addEventListener('DOMContentLoaded', loadNewsDetail);
    </script>
</body>
</html>
