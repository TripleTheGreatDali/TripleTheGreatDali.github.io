<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publications | MD Foysal Ahmed</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <style>
        .publications-page {
            padding: 80px 20px;
        }
        
        .filter-section {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .filter-btn {
            padding: 10px 20px;
            border: 2px solid #1F4E79;
            background: transparent;
            color: #1F4E79;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .filter-btn.active {
            background: #1F4E79;
            color: white;
        }
        
        .filter-btn:hover {
            background: #1F4E79;
            color: white;
        }
        
        .publication-full-item {
            background: white;
            padding: 30px;
            border-radius: 10px;
            border-left: 5px solid #FFA500;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }
        
        .publication-full-item:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .publication-year {
            display: inline-block;
            background: #1F4E79;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .publication-full-title {
            font-size: 1.3em;
            font-weight: 700;
            color: #1F4E79;
            margin-bottom: 10px;
        }
        
        .publication-full-authors {
            color: #666;
            font-size: 1em;
            margin-bottom: 10px;
        }
        
        .publication-full-venue {
            color: #888;
            font-size: 0.95em;
            margin-bottom: 15px;
        }
        
        .publication-full-abstract {
            color: #666;
            line-height: 1.8;
            margin-bottom: 15px;
        }
        
        .publication-full-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .publication-tag {
            background: #f0f0f0;
            color: #1F4E79;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
        }
        
        .publication-links {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }
        
        .publication-links a {
            display: inline-block;
            margin-right: 15px;
            color: #1F4E79;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .publication-links a:hover {
            color: #FFA500;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">MD Foysal Ahmed</div>
            <ul class="nav-links">
                <li><a href="../index.html#home">Home</a></li>
                <li><a href="../index.html#research">Research</a></li>
                <li><a href="../index.html#projects">Projects</a></li>
                <li><a href="../index.html#publications">Publications</a></li>
                <li><a href="../index.html#skills">Skills</a></li>
                <li><a href="../index.html#contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Publications Page -->
    <section class="publications-page">
        <div class="container">
            <h2>Research Publications</h2>
            
            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">All Publications</button>
                <button class="filter-btn" data-filter="Medical Imaging">Medical Imaging</button>
                <button class="filter-btn" data-filter="Deep Learning">Deep Learning</button>
                <button class="filter-btn" data-filter="Computer Vision">Computer Vision</button>
            </div>
            
            <div id="publications-list"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 MD Foysal Ahmed. All rights reserved.</p>
        </div>
    </footer>

    <script>
        async function loadPublications() {
            try {
                const response = await fetch('../assets/data/publications.json');
                const publications = await response.json();
                const container = document.getElementById('publications-list');
                
                function renderPublications(filter = 'all') {
                    let filtered = publications;
                    
                    if (filter !== 'all') {
                        filtered = publications.filter(pub => pub.tags.includes(filter));
                    }
                    
                    const html = filtered.map(pub => `
                        <div class="publication-full-item">
                            <div class="publication-year">${pub.year}</div>
                            <div class="publication-full-title">${pub.title}</div>
                            <div class="publication-full-authors">${pub.authors}</div>
                            <div class="publication-full-venue">
                                ${pub.journal || pub.conference}
                            </div>
                            <div class="publication-full-abstract">${pub.abstract}</div>
                            <div class="publication-full-tags">
                                ${pub.tags.map(tag => `<span class="publication-tag">${tag}</span>`).join('')}
                            </div>
                            <div class="publication-links">
                                ${pub.doi ? `<a href="https://doi.org/${pub.doi}" target="_blank">DOI: ${pub.doi}</a>` : ''}
                            </div>
                        </div>
                    `).join('');
                    
                    container.innerHTML = html;
                }
                
                // Initial render
                renderPublications();
                
                // Filter functionality
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        renderPublications(this.dataset.filter);
                    });
                });
                
            } catch (error) {
                console.error('Error loading publications:', error);
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadPublications);
    </script>
</body>
</html>
