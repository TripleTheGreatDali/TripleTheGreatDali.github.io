<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publications | MD Foysal Ahmed</title>
    <link rel="stylesheet" href="../css/header.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            line-height: 1.7;
            color: #e0e0ff;
            background-color: #0a0e27;
            position: relative;
            overflow-x: hidden;
        }

        .publications-page {
            padding: 100px 20px;
            min-height: 100vh;
            background: linear-gradient(135deg, rgba(10, 14, 39, 0.98) 0%, rgba(5, 8, 19, 0.98) 100%);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .page-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .page-header h1 {
            font-size: 3em;
            margin-bottom: 15px;
            color: #00D9FF;
            text-shadow: 0 0 20px rgba(0, 217, 255, 0.4);
            letter-spacing: 2px;
            font-weight: 900;
        }

        .page-header p {
            font-size: 1.05em;
            color: #a0a0c0;
            letter-spacing: 0.5px;
        }

        .filter-section {
            display: flex;
            gap: 12px;
            margin-bottom: 60px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            padding: 12px 24px;
            border: 2px solid #00D9FF;
            background: transparent;
            color: #00D9FF;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.2);
        }

        .filter-btn:hover {
            background: rgba(0, 217, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.4);
            transform: translateY(-2px);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #00D9FF, #1F4E79);
            color: white;
            border-color: #FFA500;
            box-shadow: 0 0 25px rgba(0, 217, 255, 0.7);
            transform: scale(1.05);
        }

        .publications-list {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .publication-item {
            background: linear-gradient(135deg, rgba(31, 78, 121, 0.08) 0%, rgba(255, 165, 0, 0.03) 100%);
            padding: 35px;
            border-radius: 12px;
            border-left: 5px solid #FFA500;
            box-shadow: 0 8px 32px rgba(0, 217, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
            animation: slideIn 0.5s ease-out forwards;
            opacity: 0;
        }

        .publication-item:nth-child(1) { animation-delay: 0.1s; }
        .publication-item:nth-child(2) { animation-delay: 0.2s; }
        .publication-item:nth-child(3) { animation-delay: 0.3s; }
        .publication-item:nth-child(4) { animation-delay: 0.4s; }
        .publication-item:nth-child(5) { animation-delay: 0.5s; }
        .publication-item:nth-child(6) { animation-delay: 0.6s; }
        .publication-item:nth-child(7) { animation-delay: 0.7s; }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .publication-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 217, 255, 0.1), transparent);
            transition: left 0.5s ease;
            z-index: 0;
        }

        .publication-item:hover::before {
            left: 100%;
        }

        .publication-item > * {
            position: relative;
            z-index: 1;
        }

        .publication-item:hover {
            box-shadow: 0 15px 50px rgba(0, 217, 255, 0.2);
            transform: translateY(-8px);
            border-left-color: #00D9FF;
        }

        .publication-year {
            display: inline-block;
            background: rgba(176, 38, 255, 0.3);
            color: #00F0FF;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 700;
            margin-bottom: 15px;
            border: 1px solid rgba(0, 240, 255, 0.3);
        }

        .publication-title {
            font-size: 1.4em;
            font-weight: 800;
            color: #00D9FF;
            margin-bottom: 12px;
            line-height: 1.5;
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.2);
        }

        .publication-authors {
            font-size: 0.95em;
            color: #888;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .publication-venue {
            font-size: 0.95em;
            color: #00D9FF;
            margin-bottom: 18px;
            font-weight: 600;
        }

        .publication-abstract {
            font-size: 0.95em;
            color: #a8a8c8;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .publication-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .publication-tag {
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.2), rgba(176, 38, 255, 0.2));
            color: #00D9FF;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85em;
            border: 1px solid rgba(0, 217, 255, 0.4);
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .publication-tag:hover {
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.4), rgba(176, 38, 255, 0.4));
            border-color: rgba(0, 217, 255, 0.7);
            transform: scale(1.05);
        }

        .publication-links {
            display: flex;
            gap: 15px;
            align-items: center;
            padding-top: 20px;
            border-top: 2px solid rgba(0, 217, 255, 0.15);
            margin-top: 20px;
        }

        .doi-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            background: linear-gradient(135deg, #00D9FF 0%, #1F4E79 50%, #FFA500 100%);
            color: white;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.95em;
            border-radius: 10px;
            border: 3px solid rgba(255, 165, 0, 0.4);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 6px 20px rgba(0, 217, 255, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        .doi-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s ease;
            z-index: 0;
        }

        .doi-link:hover::before {
            left: 100%;
        }

        .doi-link > * {
            position: relative;
            z-index: 1;
        }

        .doi-link:hover {
            background: linear-gradient(135deg, #00F0FF 0%, #FFA500 50%, #FF6B35 100%);
            transform: translateY(-4px) scale(1.08);
            box-shadow: 0 12px 35px rgba(255, 165, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .doi-link:active {
            transform: translateY(-2px) scale(1.05);
        }

        .link-icon {
            font-size: 1.3em;
        }

        .external-icon {
            font-size: 0.9em;
            font-weight: 900;
        }

        .footer {
            text-align: center;
            padding: 40px 20px;
            color: #666;
            font-size: 0.9em;
            border-top: 1px solid rgba(0, 217, 255, 0.1);
            margin-top: 80px;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #888;
            background: rgba(0, 217, 255, 0.05);
            border-radius: 10px;
            margin: 40px 0;
        }

        @media (max-width: 768px) {
            .publications-page {
                padding: 60px 15px;
            }

            .page-header h1 {
                font-size: 2em;
            }

            .publication-item {
                padding: 25px;
            }

            .publication-title {
                font-size: 1.2em;
            }

            .filter-section {
                flex-direction: column;
                gap: 10px;
            }

            .filter-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">MD Foysal Ahmed</div>
            <ul class="nav-links">
                <li><a href="../index.html#hero" class="nav-link">Home</a></li>
                <li><a href="../index.html#education" class="nav-link">Education</a></li>
                <li><a href="../index.html#publications" class="nav-link">Publications</a></li>
                <li><a href="../index.html#upcoming" class="nav-link">Research</a></li>
                <li><a href="../index.html#projects" class="nav-link">Projects</a></li>
                <li><a href="../index.html#contact" class="nav-link">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Publications Page -->
    <section class="publications-page">
        <div class="container">
            <div class="page-header">
                <h1><span style="color: #00D9FF;">&lt;</span> Publications <span style="color: #00D9FF;">/&gt;</span></h1>
                <p>Peer-reviewed research in AI, Computer Vision, and Medical Imaging</p>
            </div>

            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">All Publications</button>
                <button class="filter-btn" data-filter="Medical Imaging">Medical Imaging</button>
                <button class="filter-btn" data-filter="Deep Learning">Deep Learning</button>
                <button class="filter-btn" data-filter="Computer Vision">Computer Vision</button>
                <button class="filter-btn" data-filter="AI Ethics">AI Ethics</button>
            </div>

            <div class="publications-list" id="publications-list"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 MD Foysal Ahmed. All rights reserved.</p>
    </footer>

    <script>
        // Initialize publications as an empty array to prevent undefined errors
        let publications = [];

        async function loadPublications() {
            try {
                const response = await fetch('../assets/data/publications.json');

                if (!response.ok) {
                    throw new Error(`Failed to load publications: ${response.status}`);
                }

                publications = await response.json();
            } catch (error) {
                console.error('Error loading publications:', error);
                document.getElementById('publications-list').innerHTML = `
                    <div class="no-results">
                        <strong>Error loading publications.</strong><br>
                        Please refresh the page or try again later.
                    </div>
                `;
                // Keep publications as an empty array so filter functions gracefully
                publications = [];
            }

            // Initial render
            renderPublications('all');

            // Filter functionality
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-btn').forEach(b => {
                        b.classList.remove('active');
                    });
                    this.classList.add('active');
                    renderPublications(this.dataset.filter);
                });
            });
        }

        function renderPublications(filter) {
            const container = document.getElementById('publications-list');
            
            // Filter publications based on selected tag
            let filtered = publications;
            if (filter !== 'all') {
                filtered = publications.filter(pub => 
                    pub.tags && Array.isArray(pub.tags) && pub.tags.includes(filter)
                );
            }

            // Handle empty results
            if (filtered.length === 0) {
                container.innerHTML = '<div class="no-results">No publications found for this filter.</div>';
                return;
            }

            // Generate HTML for each publication
            const html = filtered.map(pub => `
                <div class="publication-item">
                    <div class="publication-year">${pub.year || 'N/A'}</div>
                    <div class="publication-title">${pub.title}</div>
                    <div class="publication-authors">${pub.authors || 'Unknown'}</div>
                    <div class="publication-venue">
                        ${pub.journal || pub.conference || 'Unknown'}
                    </div>
                    <div class="publication-abstract">
                        ${pub.abstract || 'No abstract available'}
                    </div>
                    <div class="publication-tags">
                        ${pub.tags ? pub.tags.map(tag => 
                            `<span class="publication-tag">${tag}</span>`
                        ).join('') : ''}
                    </div>
                    <div class="publication-links">
                        ${pub.doi ? `
                            <a href="${pub.doi}" 
                               target="_blank" 
                               rel="noopener noreferrer" 
                               title="Open article in new window" 
                               class="doi-link">
                                <span class="link-icon">📄</span>
                                <span>Read Full Article</span>
                                <span class="external-icon">↗</span>
                            </a>
                        ` : `<span style="color: #666;">DOI not available</span>`}
                    </div>
                </div>
            `).join('');

            container.innerHTML = html;
        }

        // Start loading publications when DOM is ready
        document.addEventListener('DOMContentLoaded', loadPublications);
    </script>
</body>
</html>
