<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publications | MD Foysal Ahmed</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <style>
        .publications-page {
            padding: 80px 20px;
            background: linear-gradient(135deg, rgba(10, 14, 39, 0.95), rgba(5, 8, 19, 0.95));
            min-height: 100vh;
        }
        
        .publications-page h2 {
            font-size: 2.5em;
            text-align: center;
            margin-bottom: 15px;
            color: #00D9FF;
            text-shadow: 0 0 20px rgba(0, 217, 255, 0.4);
            letter-spacing: 2px;
        }
        
        .publications-page > .container > p {
            text-align: center;
            color: #888;
            font-size: 1.1em;
            margin-bottom: 40px;
            letter-spacing: 0.5px;
        }
        
        .filter-section {
            display: flex;
            gap: 15px;
            margin-bottom: 50px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .filter-btn {
            padding: 12px 24px;
            border: 2px solid #00D9FF;
            background: transparent;
            color: #00D9FF;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9em;
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.2);
        }
        
        .filter-btn.active {
            background: linear-gradient(135deg, #00D9FF, #1F4E79);
            color: white;
            border-color: #FFA500;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.6);
            transform: scale(1.05);
        }
        
        .filter-btn:hover {
            background: rgba(0, 217, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.4);
            transform: translateY(-2px);
            border-color: #FFA500;
        }
        
        .publication-full-item {
            background: linear-gradient(135deg, rgba(31, 78, 121, 0.1) 0%, rgba(255, 165, 0, 0.05) 100%);
            padding: 30px;
            border-radius: 12px;
            border-left: 5px solid #FFA500;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(0, 217, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
        }
        
        .publication-full-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 217, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }
        
        .publication-full-item:hover::before {
            left: 100%;
        }
        
        .publication-full-item:hover {
            box-shadow: 0 12px 48px rgba(0, 217, 255, 0.25);
            transform: translateY(-5px);
            border-left-color: #00D9FF;
        }
        
        .publication-year {
            display: inline-block;
            background: #1F4E79;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .publication-full-title {
            font-size: 1.3em;
            font-weight: 700;
            color: #00D9FF;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.3);
        }
        
        .publication-full-authors {
            color: #888;
            font-size: 1em;
            margin-bottom: 10px;
        }
        
        .publication-full-venue {
            color: #1F4E79;
            font-size: 0.95em;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .publication-full-abstract {
            color: #555;
            line-height: 1.8;
            margin-bottom: 15px;
        }
        
        .publication-full-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        
        .publication-tag {
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.2), rgba(176, 38, 255, 0.2));
            color: #1F4E79;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85em;
            border: 1px solid rgba(0, 217, 255, 0.3);
            transition: all 0.3s ease;
        }
        
        .publication-tag:hover {
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.4), rgba(176, 38, 255, 0.4));
            border-color: rgba(0, 217, 255, 0.6);
            transform: scale(1.05);
        }
        
        .publication-links {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid rgba(0, 217, 255, 0.2);
            display: flex;
            align-items: center;
        }
        
        .publication-links a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            color: white;
            background: linear-gradient(135deg, #00D9FF, #1F4E79);
            text-decoration: none;
            font-weight: 700;
            border-radius: 8px;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            border: 2px solid transparent;
            box-shadow: 0 4px 15px rgba(0, 217, 255, 0.3);
            font-size: 0.95em;
            letter-spacing: 0.5px;
        }
        
        .publication-links a:hover {
            background: linear-gradient(135deg, #00F0FF, #FFA500);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 165, 0, 0.5);
            border-color: rgba(255, 165, 0, 0.5);
        }
        
        .publication-links a:active {
            transform: translateY(-1px) scale(0.98);
        }
        
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .publication-full-item {
            animation: slideInUp 0.5s ease-out;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">MD Foysal Ahmed</div>
            <ul class="nav-links">
                <li><a href="../index.html#home">Home</a></li>
                <li><a href="../index.html#research">Research</a></li>
                <li><a href="../index.html#projects">Projects</a></li>
                <li><a href="../index.html#publications">Publications</a></li>
                <li><a href="../index.html#skills">Skills</a></li>
                <li><a href="../index.html#contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Publications Page -->
    <section class="publications-page">
        <div class="container">
            <h2><span style="color: #00D9FF;">&lt;</span> Research Publications <span style="color: #00D9FF;">/&gt;</span></h2>
            <p>Peer-reviewed journals and conference papers in AI, Computer Vision, and Medical Imaging</p>
            
            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">All Publications</button>
                <button class="filter-btn" data-filter="Medical Imaging">Medical Imaging</button>
                <button class="filter-btn" data-filter="Deep Learning">Deep Learning</button>
                <button class="filter-btn" data-filter="Computer Vision">Computer Vision</button>
                <button class="filter-btn" data-filter="AI Ethics">AI Ethics</button>
            </div>
            
            <div id="publications-list"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 MD Foysal Ahmed. All rights reserved.</p>
        </div>
    </footer>

    <script>
        async function loadPublications() {
            try {
                const response = await fetch('../assets/data/publications.json');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const publications = await response.json();
                console.log('Publications loaded:', publications);
                
                const container = document.getElementById('publications-list');
                
                function renderPublications(filter = 'all') {
                    let filtered = publications;
                    
                    if (filter !== 'all') {
                        filtered = publications.filter(pub => pub.tags && pub.tags.includes(filter));
                    }
                    
                    const html = filtered.map((pub, index) => `
                        <div class="publication-full-item" style="animation-delay: ${index * 0.1}s;">
                            <div class="publication-year">${pub.year || 'N/A'}</div>
                            <div class="publication-full-title">${pub.title}</div>
                            <div class="publication-full-authors">${pub.authors || 'Unknown'}</div>
                            <div class="publication-full-venue">
                                ${pub.journal || pub.conference || 'Unknown'}
                            </div>
                            <div class="publication-full-abstract">${pub.abstract || 'No abstract available'}</div>
                            <div class="publication-full-tags">
                                ${pub.tags ? pub.tags.map(tag => `<span class="publication-tag">${tag}</span>`).join('') : ''}
                            </div>
                            <div class="publication-links">
                                ${pub.doi ? `<a href="${pub.doi}" target="_blank" rel="noopener noreferrer" title="Open DOI link">
                                    <span>🔗</span> 
                                    <span>View Article</span>
                                </a>` : '<span style="color: #888;">DOI not available</span>'}
                            </div>
                        </div>
                    `).join('');
                    
                    container.innerHTML = html;
                }
                
                // Initial render
                renderPublications();
                
                // Filter functionality
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        renderPublications(this.dataset.filter);
                        console.log('Filtered by:', this.dataset.filter);
                    });
                });
                
            } catch (error) {
                console.error('Error loading publications:', error);
                document.getElementById('publications-list').innerHTML = `
                    <div style="background: #fff; padding: 20px; border-radius: 8px; color: #d32f2f;">
                        Error loading publications. Please try refreshing the page.
                    </div>
                `;
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadPublications);
    </script>
</body>
</html>
