    <script>
        // Load education data from JSON or use default
        async function loadEducation() {
            try {
                // For now, using default data - can be extended with JSON file
                const educationData = [
                    {
                        degree: "PhD in Computer Science",
                        institution: "University of Technology",
                        year: "2023 - Present",
                        description: "Specializing in Deep Learning and Computer Vision with focus on activity recognition and multimodal learning."
                    },
                    {
                        degree: "Master's in Artificial Intelligence",
                        institution: "Institute of Technology",
                        year: "2021 - 2023",
                        description: "Advanced studies in machine learning, neural networks, and computer vision applications."
                    },
                    {
                        degree: "Bachelor's in Computer Science",
                        institution: "University of Engineering",
                        year: "2017 - 2021",
                        description: "Comprehensive study of computer science fundamentals, algorithms, and software development."
                    }
                ];

                const container = document.getElementById('educationTimeline');
                container.innerHTML = '';

                educationData.forEach(edu => {
                    const item = document.createElement('div');
                    item.className = 'timeline-item';
                    item.innerHTML = `
                        <h3>${edu.degree}</h3>
                        <p class="year">${edu.year}</p>
                        <p><strong>${edu.institution}</strong></p>
                        <p>${edu.description}</p>
                    `;
                    container.appendChild(item);
                });
            } catch (error) {
                console.error('Error loading education:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', loadEducation);
    </script>
